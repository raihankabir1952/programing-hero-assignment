<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevConf 2026 Navbar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- navbar start -->
    <section class="navbar">
        <div class="container navbar-flex">
            <div class="nav-logo">
                <img src="./assets/logo.png" alt="DevConf Logo" class="logo-image">
            </div>
            <ul class="nav-menu">
                <li><a href="#">Speakers</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Tracks</a></li>
                <li><a href="#">Venue</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
            <div class="nav-btn">
                <button class="register-btn">Register Now</button>
            </div>
        </div>
    </section>
    <!-- navbar end -->

    <!-- hero section start -->
    <section class="hero-section">

        <div class="container hero-content">
            
            <h1 class="hero-title">Code. <em>Connect</em>. Create</h1>
            
            <p class="hero-paragraph">
                Join 4,000+ engineers, founders, and builders at the premier developer <br>
                conference of 2026. Three days of cutting-edge talks, hands-on workshops, <br>
                and meaningful connections.
            </p>
            
            <button class="hero-register-btn">Register Now</button>
            
        </div>
    </section>
    <!-- hero section end -->

    <!-- speakers section start -->
     <section class="speakers-section">

     </section>
<!-- speakers section end -->


</body>

</html>
